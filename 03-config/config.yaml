engine:
  default_platform: generic
  default_style: realistic
  max_retries: 2
knowledge:
  embedding:
    model: text-embedding-3-small
  enabled: true
  persist_dir: ./prompts_db
  retrieval:
    min_score: 0.3
    top_k: 3
llm:
  deepseek:
    api_key: ${DEEPSEEK_API_KEY}
    base_url: https://api.deepseek.com
    max_tokens: 500
    model: deepseek-v4-pro
    temperature: 0.7
    timeout: 60
  minimax:
    api_key: ${MINIMAX_API_KEY}
    base_url: https://api.minimaxi.com/v1
    max_tokens: 500
    model: MiniMax-M3
    temperature: 0.7
    timeout: 60
  openai_compat:
    api_key: ${OPENAI_API_KEY}
    base_url: https://openrouter.ai/api/v1
    max_tokens: 500
    model: deepseek/deepseek-chat
    temperature: 0.7
    timeout: 60
  provider: deepseek
  xfyun:
    api_key: ${XFYUN_API_KEY}
    base_url: https://maas-coding-api.cn-huabei-1.xf-yun.com/v2
    max_tokens: 500
    model: astron-code-latest
    temperature: 0.7
    timeout: 60
platforms:
  dalle:
    enabled: true
  generic:
    enabled: true
  jimeng:
    enabled: true
  midjourney:
    default_aspect_ratio: '16:9'
    default_version: '6'
    enabled: true
  stable_diffusion:
    enabled: true
  tongyi:
    enabled: true
  yizhang:
    enabled: true
server:
  host: 0.0.0.0
  log_level: info
  port: 8013
