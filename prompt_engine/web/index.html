function isEnglish(text) {
  if (!text) return false;
  let asciiCount = (text.match(/[a-zA-Z]/g) || []).length;
  return asciiCount / text.length > 0.3;
}

function translateEN2CN(text) {
  if (!text) return '';
  const tokens = text.match(/\b\w+\b|[^\w\s]|\s+/g) || [];
  return tokens.map(tok => {
    if (/^\s+$/.test(tok)) return tok;
    if (!/^[a-zA-Z]+$/.test(tok)) return tok;
    return EN_CN_DICT[tok.toLowerCase()] || tok;
  }).join('');
}

    return r.json();

                <el-tag size="small" type="info">① 关键词匹配</el-tag> →

                <code>{option1|option2}</code> — 随机变体<br>

            <el-tag v-for="ex in group.items" :key="ex" size="small"

  setup() {
    const input = ref('');
    const inputText = ref('');
    const style = ref('');
    const rewriteInput = ref('');
    const rewriteResult = ref(null);
    const rewriting = ref(false);
    const keywords = ref([]);
    const mode = ref('single');  // 'single' | 'batch'
    const batchResults = ref([]);
    const batchRunning = ref(false);
    const batchProgressPercent = ref(0);
    const platform = ref('midjourney');
    const platforms = ref([
      {value:'midjourney', label:'🎨 Midjourney'},
      {value:'stable_diffusion', label:'🖌️ Stable Diffusion'},
      {value:'dalle', label:'🖼️ DALL·E 3'},
      {value:'tongyi', label:'🏮 通义万相'},
      {value:'yizhang', label:'📜 文心一格'},
      {value:'jimeng', label:'⚡ 即梦'},
      {value:'generic', label:'🍌 Nano Banana Pro / 通用'},
    ]);
    const loading = ref(false);
    const classifying = ref(false);
    const evaluating = ref(false);
    const result = ref(null);
    const classResult = ref(null);
    const evalResult = ref(null);
    const error = ref('');
    const activeHelps = ref(['basic']);
    const previewModel = ref('picsum');
    const imageModelsData = ref([]);
    const imageModels = ref([]);
    const previewUrl = ref('');
    const previewing = ref(false);
    const feedbackMsg = ref('');
    const feedbackType = ref(null);
    const disturbLoading = ref(false);
    const disturbResults = ref(null);
    const bestIdx = ref(0);
    const inputRows = computed(() => {
      return input.value.split('\n').map(s => s.trim()).filter(s => s.length > 0);
    });
    const dimHints = {clarity:'清晰度',specificity:'具体性',creativity:'创意性',actionability:'可操作性',platform_best:'平台适配'};

    const examples = [
      'a majestic cat sitting on a velvet throne',
      'cyberpunk city at night with neon lights',
      '一只金色的凤凰在夕阳下展翅飞翔',
      '水彩风格的樱花树下少女',
      'an astronaut riding a horse on Mars with dramatic lighting',
    ];

    const exampleGroups = [
      {title:'风景', items:['sunset over mountain lake with mist','aurora borealis over snow-covered cabin','梦幻森林中的魔法光斑']},
      {title:'人物', items:['portrait of a warrior queen with golden armor','anime girl with flowing hair in cherry blossom','水墨画风格的古代侠客']},
      {title:'科幻', items:['cyberpunk hacker in neon-lit alley','steampunk airship above clouds','futuristic city with flying cars at dusk']},
      {title:'动物', items:['majestic white wolf with glowing blue eyes','孔雀在雨中开屏','golden retriever puppy in flower field']},
    ];

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => {
        ElMessage.success('已复制');
      }).catch(() => {
        ElMessage.error('复制失败');
      });
    }

    async function submitFeedback(type) {
      if (!result.value?.optimized_prompt) return;
      feedbackType.value = type;
      try {
        await api.post('/v1/feedback', {
          entry_type: type,
          prompt: inputText.value || '',
          optimized_prompt: result.value.optimized_prompt,
          platform: platform.value,
          category: result.value.detected_categories?.categories?.[0]?.value || ''
        });
        feedbackMsg.value = '感谢反馈！';
        setTimeout(() => { feedbackMsg.value = ''; }, 3000);
      } catch(e) { feedbackMsg.value = '提交失败'; }
    }

    async function disturbOptimize() {
      if (!input.value.trim()) return;
      disturbLoading.value = true; disturbResults.value = null;
      try {
        const d = await api.post('/v1/disturb-optimize', {
          prompt: input.value, platform: platform.value, num_candidates: 3
        });
        if (d.detail) { error.value = typeof d.detail === 'string' ? d.detail : JSON.stringify(d.detail); }
        else if (d.candidates && d.candidates.length >= 3) {
          disturbResults.value = d.candidates;
          bestIdx.value = 1;  // 默认选中版本2 (最佳)
        }
      } catch(e) { error.value = String(e); }
      finally { disturbLoading.value = false; }
    }

    async function loadKeywords() {
      try {
        const d = await api.get('/v1/keywords');
        keywords.value = d;
      } catch(e) {}
    }
    loadKeywords();

    async function doRewrite() {
      if (!rewriteInput.value.trim()) return;
      rewriting.value = true; rewriteResult.value = null;
      try {
        const d = await api.post('/v1/rewrite', {prompt: rewriteInput.value, platform: platform.value});
        if (d.detail) { error.value = typeof d.detail === 'string' ? d.detail : JSON.stringify(d.detail); }
        else { rewriteResult.value = d; }
      } catch(e) { error.value = String(e); }
      finally { rewriting.value = false; }
    }

    async function optimize() {
      if (!input.value.trim()) return;
      loading.value = true; result.value = null; classResult.value = null; evalResult.value = null; error.value = '';
      try {
        const d = await api.post('/v1/optimize', {prompt: input.value, platform: platform.value, style: style.value || null});
        if (d.detail) { error.value = typeof d.detail === 'string' ? d.detail : JSON.stringify(d.detail); return; }
        result.value = d; inputText.value = input.value;
      } catch(e) { error.value = String(e); }
      finally { loading.value = false; }
    }

    async function optimizeBatch() {
      const prompts = inputRows.value.slice(0, 10);
      if (prompts.length === 0) {
        ElMessage.warning('请输入至少一行 prompt（每行一个）');
        return;
      }
      batchRunning.value = true;
      batchResults.value = [];
      batchProgressPercent.value = 0;
      for (let i = 0; i < prompts.length; i++) {
        try {
          const d = await api.post('/v1/optimize', {prompt: prompts[i], platform: platform.value});
          if (d.detail) {
            batchResults.value.push({prompt: prompts[i], result: null, error: typeof d.detail === 'string' ? d.detail : JSON.stringify(d.detail)});
          } else {
            batchResults.value.push({prompt: prompts[i], result: d, error: null});
          }
        } catch(e) {
          batchResults.value.push({prompt: prompts[i], result: null, error: String(e)});
        }
        batchProgressPercent.value = Math.round(((i + 1) / prompts.length) * 100);
      }
      batchRunning.value = false;
      ElMessage.success(`批量优化完成：${batchResults.value.filter(r => !r.error).length}/${prompts.length} 成功`);
    }
    async function classify() {
      if (!input.value.trim()) return;
      classifying.value = true; error.value = '';
      try {
        classResult.value = await api.post('/v1/classify', {prompt: input.value});
      } catch(e) { error.value = String(e); }
      finally { classifying.value = false; }
    }
    async function evaluate() {
      if (!result.value?.optimized_prompt) {
        error.value = '请先优化 prompt，再进行评估对比';
        return;
      }
      evaluating.value = true; error.value = '';
      try {
        const d = await api.post('/v1/evaluate', {original: inputText.value || result.value.optimized_prompt, optimized: result.value.optimized_prompt});
        if (d.scores) {
          evalResult.value = {
            scores: Object.entries(d.scores).map(([k,v]) => ({dimension: dimHints[k]||k, ...v})),
            overall: d.overall_improvement?.toFixed(2) || '-'
          };
        }
      } catch(e) { error.value = String(e); }
      finally { evaluating.value = false; }
    }
    function clear() { input.value = ''; result.value = null; classResult.value = null; evalResult.value = null; error.value = ''; }

    // 加载图片模型清单
    api.get('/v1/image-models').then(m => { imageModelsData.value = m; });
    // 默认 picsum 在前
    setTimeout(() => { if (!imageModels.value.length) imageModelsData.value = [{id:'picsum',name:'Picsum Photos',requires_key:false}]; }, 1000);

    async function generatePreview() {
      if (!result.value?.optimized_prompt) return;
      previewing.value = true; previewUrl.value = '';
      try {
        const d = await api.post('/v1/preview', {prompt: result.value.optimized_prompt, model: previewModel.value});
        if (d.url) previewUrl.value = d.url;
        else if (d.note) error.value = d.note;
      } catch(e) { error.value = String(e); }
      finally { previewing.value = false; }
    }

    return { input, inputText, mode, batchResults, batchRunning, batchProgressPercent, inputRows,
             platform, platforms, loading, classifying, evaluating, result, classResult, evalResult, error,
             activeHelps, dimHints, examples, exampleGroups, optimize, optimizeBatch, classify, evaluate, clear, copyText,
             previewModel, imageModels, previewUrl, previewing, generatePreview,
             style, rewriteInput, rewriteResult, rewriting, keywords,
             feedbackMsg, feedbackType, submitFeedback,
             disturbLoading, disturbResults, bestIdx, disturbOptimize,
             EN_CN_DICT, isEnglish, translateEN2CN };
  }
};

      {label:'总请求数', value:0, hint:'所有平台累计调用次数'},

    const resources = reactive({});
    const catChart = ref(null);
    const platChart = ref(null);
    const noData = ref(true);

    onMounted(async () => {
      try {
        const overview = await api.get('/v1/stats/overview');
        const res = await api.get('/v1/resources');
        Object.assign(resources, res);
        statCards.length = 0;
        statCards.push(
          {label:'总请求数', value:overview.total_requests, hint:'所有平台累计调用次数'},
          {label:'成功率', value:overview.success_rate+'%', hint:'成功/总请求'},

          {label:'错误数', value:overview.error_count, hint:'失败的请求数量'},
        );

        const [cats, plats] = await Promise.all([
          api.get('/v1/stats/categories'),
          api.get('/v1/stats/platforms')
        ]);

        if (cats.length === 0 || plats.length === 0) { noData.value = true; }

        if (window.echarts && cats.length > 0) {
          const ec1 = echarts.init(catChart.value);
          ec1.setOption({
            tooltip:{trigger:'item', formatter:'{b}: {c} ({d}%)'},
            series:[{
              type:'pie', radius:['30%','70%'],
              data: cats.map(c=>({name:c.name, value:c.count})),
              label:{fontSize:11, formatter:'{b}\n{d}%'},
              emphasis:{itemStyle:{shadowBlur:10,shadowOffsetX:0,shadowColor:'rgba(0,0,0,0.5)'}}
            }]
          });
        }
        if (window.echarts && plats.length > 0) {
          const ec2 = echarts.init(platChart.value);
          ec2.setOption({
            tooltip:{trigger:'axis'},
            xAxis:{type:'category', data:plats.map(p=>p.platform), axisLabel:{fontSize:11}},

              barWidth:'50%',
              label:{show:true, position:'top', fontSize:11}
            }]
          });
        }
      } catch(e) {}
    });
    return { statCards, resources, catChart, platChart, noData };
  }
};

            prompt-engine 内置 16+ 主流图片生成模型。
            <b>Picsum Photos</b> 完全免费真实图片，开箱即用。
            其他模型需在下方填写对应 API Key（重启服务生效）。
          </div>
          <el-table :data="imageModels" stripe size="small" :show-header="true">
            <el-table-column prop="name" label="模型" width="140" />
            <el-table-column prop="provider" label="供应商" width="100">
              <template #default="{row}"><el-tag size="small" effect="plain">{{row.provider}}</el-tag></template>
            </el-table-column>
            <el-table-column label="费用" width="100">
              <template #default="{row}">
                <el-tag size="small" :type="row.requires_key?'warning':'success'" effect="plain">
                  {{row.requires_key?'需 API Key':'免费'}}
                </el-tag>
              </template>
            </el-table-column>
            <el-table-column prop="description" label="说明" min-width="200" />
          </el-table>
          <el-collapse style="margin-top:12px">
            <el-collapse-item title="🔑 配置 API Key（环境变量）" name="apikey">
              <el-table :data="apiKeyConfigs" stripe size="small" border>
                <el-table-column prop="provider" label="供应商" width="100" />
                <el-table-column prop="env_var" label="环境变量" />
                <el-table-column prop="description" label="说明" />
              </el-table>
              <div style="margin-top:8px;font-size:12px;color:#909399">
                💡 在系统环境变量或 .env 文件中设置上述变量，重启后端服务即可使用
              </div>
            </el-collapse-item>
          </el-collapse>
        </el-card>

        <el-card shadow="never" style="margin-top:16px">
          <template #header>
            <div style="display:flex;justify-content:space-between">
              <span>ℹ️ 系统信息</span>
              <span style="font-size:12px;color:#909399">引擎版本和依赖</span>
            </div>
          </template>
          <el-descriptions :column="1" border size="small">
            <el-descriptions-item label="版本">v0.8.0</el-descriptions-item>
            <el-descriptions-item label="API 端点">20 个 REST 端点</el-descriptions-item>
            <el-descriptions-item label="测试">190 个用例，全部通过</el-descriptions-item>
            <el-descriptions-item label="RAG 种子">awesome-gpt-image-2 + gpt4o-image-prompts (1556 条)</el-descriptions-item>
            <el-descriptions-item label="风格维度">25 个 MJ 风格维度（三级分类流水线）</el-descriptions-item>
            <el-descriptions-item label="集成方式">SDK / REST / MCP / CLI / Agent Skill</el-descriptions-item>
          </el-descriptions>
        </el-card>
      </el-col>
    </el-row>
  `,
  setup() {
    const provider = ref('openai');
    const imageModels = ref([]);
    const apiKeyConfigs = reactive([
      {provider:'Picsum Photos',env_var:'(无需 Key)',description:'免费真实图片，开箱即用'},
      {provider:'MiniMax',env_var:'MiniMax_API_KEY',description:'用于 image-01（国内可直连）'},
      {provider:'Vidu',env_var:'VIDU_API_KEY',description:'用于 Vidu 文生图（生数科技）'},
      {provider:'OpenAI',env_var:'OPENAI_API_KEY',description:'用于 DALL-E 3 / DALL-E 2 / GPT-Image-1'},
      {provider:'Replicate',env_var:'REPLICATE_API_KEY',description:'用于 Flux Pro / Schnell / Midjourney v6 / Kandinsky'},
      {provider:'Stability',env_var:'STABILITY_API_KEY',description:'用于 Stable Diffusion XL / SD3.5'},
      {provider:'Together',env_var:'TOGETHER_API_KEY',description:'用于 Ideogram v2 / Playground / Imagen 3'},
      {provider:'xAI',env_var:'XAI_API_KEY',description:'用于 Grok Aurora 图像生成'},
    ]);
    onMounted(async () => {
      try {
        const m = await api.get('/v1/image-models');
        imageModels.value = m;
      } catch(e) {
        // Fallback 14 model list
        imageModels.value = [
          {id:'picsum',name:'Picsum Photos',provider:'Picsum',requires_key:false,description:'免费真实图片，开箱即用'},
          {id:'dall-e-3',name:'DALL-E 3',provider:'OpenAI',requires_key:true,description:'OpenAI 高质量图'},
        ];
      }
    });
    const wildcards = reactive([
      {name:'colors', count:10, sample:'red, green, golden...'},
      {name:'animals', count:10, sample:'cat, dog, dragon...'},
      {name:'art_styles', count:10, sample:'watercolor, cyberpunk...'},
      {name:'lighting', count:10, sample:'golden hour, volumetric...'},
      {name:'materials', count:10, sample:'marble, velvet, glass...'},
    ]);
    const platforms = reactive([
      {name:'Midjourney', status:'就绪', desc:'MJ 参数映射 + 风格后缀'},
      {name:'Stable Diffusion', status:'就绪', desc:'权重语法 + 负面提示 + 英文确保'},
      {name:'DALL·E 3', status:'就绪', desc:'自然语言风格 + 短句结构'},
      {name:'通义万相', status:'就绪', desc:'中文描写 + 成语/古诗意境'},
      {name:'文心一格', status:'就绪', desc:'关键词式 + 四字短语'},
      {name:'即梦', status:'就绪', desc:'视觉冲击力 + 氛围描写'},
      {name:'Nano Banana Pro', status:'就绪', desc:'风格直描 + 推荐分辨率'},
    ]);
    return { provider, imageModels, apiKeyConfigs, wildcards, platforms };
  }
};

const app = createApp({
  components: { Workbench, Dashboard, Settings },
  setup() {
    const tab = ref('workbench');
    return { tab };
  }
});
app.use(ElementPlus);
app.mount('#app');;
</script>
