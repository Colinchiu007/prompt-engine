<!DOCTYPE html>
<html lang="zh-CN" data-app-version="0.8.0-20260613">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Engine — 图片生成提示词优化引擎 (v0.8.0)</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/@element-plus/icons-vue"></script>
  <script src="https://unpkg.com/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    .example-btn { cursor:pointer; margin:2px; }
    .example-btn:hover { color:#409eff; }
    .section-desc { color:#909399; font-size:13px; margin-bottom:12px; line-height:1.6; }
    .resource-block { padding:8px 0; }
    .resource-label { font-size:13px;color:#909399;margin-bottom:4px; }
    .resource-value { font-size:24px;font-weight:bold;color:#67c23a;margin-bottom:4px; }
    .resource-value small { font-size:12px;color:#909399;font-weight:normal; }
    .preview-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; margin-top:12px; }
  </style>
</head>
<body>
<div id="app">
  <el-container style="min-height:100vh">
    <el-header style="background:#fff;border-bottom:1px solid #e4e7ed;display:flex;align-items:center;padding:0 20px">
      <h2 style="margin:0;font-size:18px">🎨 Prompt Engine</h2>
      <span style="color:#909399;font-size:12px;margin-left:8px">v0.8.0</span>
      <el-menu mode="horizontal" :ellipsis="false" style="margin-left:40px;border-bottom:none" :default-active="tab" @select="tab=$event">
        <el-menu-item index="workbench">Prompt 工作台</el-menu-item>
        <el-menu-item index="dashboard">数据看板</el-menu-item>
        <el-menu-item index="settings">配置</el-menu-item>
      </el-menu>
    </el-header>
    <el-main style="background:#f5f7fa;padding:20px">
      <Workbench v-if="tab==='workbench'" />
      <Dashboard v-if="tab==='dashboard'" />
      <Settings v-if="tab==='settings'" />
    </el-main>
  </el-container>
</div>

<script>
const { createApp, ref, reactive, onMounted } = Vue;

const api = {
  base: '',
  async post(path, body) {
    const r = await fetch(this.base + path, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    return r.json();
  },
  async get(path) {
    const r = await fetch(this.base + path);
    return r.json();
  }
};

// ── Workbench ────────────────────────────────────
const Workbench = {
  template: `
    <el-row :gutter="16">
      <el-col :span="16">
        <el-card shadow="never">
          <template #header><span>📝 Prompt 工作台</span></template>

          <div class="section-desc">
            输入一段文字描述，选择目标图片生成平台，一键优化、分类、评估。
            支持 <b>中文</b> 和 <b>英文</b> 输入，自动适配 7 种图片生成平台。
          </div>

          <el-input v-model="input" type="textarea" :rows="4"
            placeholder="输入描述，如：a majestic cat sitting on a velvet throne in golden hour light" />

          <div style="margin:12px 0;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
            <el-select v-model="platform" style="width:160px" placeholder="选择平台">
              <el-option v-for="p in platforms" :key="p.value" :label="p.label" :value="p.value" />
            </el-select>

            <el-button type="primary" @click="optimize" :loading="loading">
              <el-icon style="margin-right:4px"><Pointer/></el-icon> 优化 Prompt
            </el-button>
            <el-button @click="classify" :loading="classifying">
              <el-icon style="margin-right:4px"><Search/></el-icon> 风格分类
            </el-button>
            <el-button @click="evaluate" :loading="evaluating">
              <el-icon style="margin-right:4px"><DataAnalysis/></el-icon> 评估对比
            </el-button>
            <el-button @click="clear" text>清空</el-button>
          </div>

          <div style="margin-bottom:8px">
            <span style="color:#909399;font-size:12px">试试这些示例：</span>
            <el-tag v-for="ex in examples" :key="ex" size="small" class="example-btn"
              @click="input=ex;result=null;classResult=null;evalResult=null;error=''"
              style="cursor:pointer;margin:2px">
              {{ ex.length > 25 ? ex.slice(0,25)+'…' : ex }}
            </el-tag>
          </div>

          <el-alert v-if="error" :title="error" type="error" show-icon closable style="margin-bottom:12px" />

          <el-tabs v-if="result" type="border-card" style="margin-top:12px">
            <el-tab-pane label="✨ 优化结果">
              <div style="margin-bottom:8px;color:#909399;font-size:12px">
                原始输入：<code>{{ inputText }}</code>
              </div>
              <pre style="background:#f0f5ff;padding:16px;border-radius:6px;white-space:pre-wrap;font-size:14px;line-height:1.6;border-left:4px solid #409eff">{{ result.optimized_prompt }}</pre>
              <div style="margin-top:8px">
                <el-tag v-if="result.platform" effect="plain">{{ result.platform }}</el-tag>
                <el-tag v-if="result.duration_ms" type="success" effect="plain" style="margin-left:8px">耗时 {{ result.duration_ms }}ms</el-tag>
              </div>

              <el-divider style="margin:20px 0"><span style="font-size:13px;color:#909399">🖼️ 图片预览</span></el-divider>
              <div class="section-desc">
                选定模型，实时生成预览图。
                <b style="color:#67c23a">Picsum Photos 免费真实图</b>开箱即用。
                其余 15 个模型（MiniMax/Vidu/DALL-E/Flux/SD等）需先到「配置」页填 API Key。
              </div>
              <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px">
                <el-select v-model="previewModel" style="width:200px" placeholder="选择模型">
                  <el-option v-for="m in imageModelsData" :key="m.id" :label="m.name + (m.requires_key?' 🔑':' 🆓')" :value="m.id" />
                </el-select>
                <el-button type="success" @click="generatePreview" :loading="previewing">
                  生成预览
                </el-button>
                <el-button v-if="previewUrl" @click="previewUrl=''">清除</el-button>
              </div>

              <div v-if="previewUrl" class="preview-grid">
                <div style="border:1px solid #ebeef5;border-radius:6px;overflow:hidden;background:#f5f7fa">
                  <img :src="previewUrl" style="width:100%;height:200px;object-fit:cover" :alt="result.optimized_prompt.slice(0,50)" />
                  <div style="padding:6px 8px;font-size:11px;color:#909399">
                    <el-tag size="small">{{ previewModel }}</el-tag>
                    <span style="margin-left:6px">1024×1024</span>
                  </div>
                </div>
              </div>
              <el-empty v-else-if="!previewing" description="点击「生成预览」查看效果" :image-size="60" />
            </el-tab-pane>

            <el-tab-pane label="🏷️ 分类结果" v-if="classResult">
              <div class="section-desc">
                引擎自动判断输入 prompt 属于 25 种 MJ 风格维度中的哪一个。
                分类采用三级流水线：关键词匹配 → 向量语义搜索 → LLM 兜底。
              </div>
              <el-descriptions :column="2" border>
                <el-descriptions-item label="风格维度">
                  <el-tag v-for="c in classResult.categories" :key="c" size="small" style="margin:2px">{{ c }}</el-tag>
                  <span v-if="!classResult.categories?.length">-</span>
                </el-descriptions-item>
                <el-descriptions-item label="置信度">
                  <el-tag :type="classResult.confidence>0.8?'success':classResult.confidence>0.5?'warning':'danger'" size="small">
                    {{ (classResult.confidence * 100).toFixed(1) }}%
                  </el-tag>
                </el-descriptions-item>
                <el-descriptions-item label="分类方法">{{ classResult.method || '-' }}</el-descriptions-item>
                <el-descriptions-item label="匹配关键词">{{ classResult.keywords_found ? Object.keys(classResult.keywords_found).join(', ') : '-' }}</el-descriptions-item>
              </el-descriptions>
            </el-tab-pane>

            <el-tab-pane label="📊 评估对比" v-if="evalResult">
              <div class="section-desc">
                从 5 个维度（清晰度、具体性、创意性、可操作性、平台适配）
                对比原始 prompt 和优化后的 prompt，展示每项提升幅度。
              </div>
              <el-table :data="evalResult.scores" stripe size="small" style="width:100%">
                <el-table-column prop="dimension" label="评估维度" width="160">
                  <template #default="{row}">
                    <span :title="dimHints[row.dimension]">{{ row.dimension }}</span>
                  </template>
                </el-table-column>
                <el-table-column prop="before" label="原始得分" width="100">
                  <template #default="{row}"><el-rate :model-value="row.before" disabled :max="10" show-score :score-template="row.before.toFixed(1)" size="small" /></template>
                </el-table-column>
                <el-table-column prop="after" label="优化得分" width="100">
                  <template #default="{row}"><el-rate :model-value="row.after" disabled :max="10" show-score :score-template="row.after.toFixed(1)" size="small" /></template>
                </el-table-column>
                <el-table-column label="提升" width="80">
                  <template #default="{row}">
                    <el-tag :type="row.improvement>1?'success':row.improvement>0?'warning':'danger'" size="small">
                      {{ row.improvement > 0 ? '+' : '' }}{{ row.improvement.toFixed(1) }}
                    </el-tag>
                  </template>
                </el-table-column>
              </el-table>
              <div style="margin-top:12px;text-align:right;font-size:13px;color:#909399">
                综合提升：<b style="color:#409eff">{{ evalResult.overall || '-' }}</b>
              </div>
            </el-tab-pane>
          </el-tabs>

          <el-empty v-if="!result && !error && !loading" description="输入描述后点击「优化 Prompt」开始" style="padding:40px 0" />
        </el-card>
      </el-col>

      <el-col :span="8">
        <el-card shadow="never">
          <template #header><span>💡 使用说明</span></template>
          <el-collapse v-model="activeHelps" style="--el-collapse-header-bg-color:transparent">
            <el-collapse-item title="📌 基本用法" name="basic">
              <ol style="padding-left:16px;margin:0;line-height:2;color:#606266;font-size:13px">
                <li>在输入框内输入图片描述（中英文均可）</li>
                <li>选择目标平台：Midjourney / Stable Diffusion / DALL·E 等</li>
                <li>点击「优化 Prompt」自动适配平台语法</li>
                <li>点击「风格分类」自动识别 25 维风格</li>
                <li>优化后点击「评估对比」量化改进效果</li>
              </ol>
            </el-collapse-item>
            <el-collapse-item title="🎯 平台差异" name="platforms">
              <div style="font-size:13px;color:#606266;line-height:1.8">
                <p><b>Midjourney</b> — 自动添加 <code>--ar</code> <code>--v</code> <code>--s</code> 参数，风格后缀</p>
                <p><b>Stable Diffusion</b> — 权重语法 <code>(word:1.2)</code>，负面提示，英文确保</p>
                <p><b>DALL·E 3</b> — 自然语言风格，短句结构，句号分隔</p>
                <p><b>通义万相</b> — 中文描写优化，成语/古诗意境增强</p>
                <p><b>文心一格</b> — 关键词式策略，四字短语为主</p>
                <p><b>即梦</b> — 视觉冲击力优先，氛围描写</p>
                <p><b>Nano Banana Pro</b> — 推荐 512x512，直接描述风格</p>
              </div>
            </el-collapse-item>
            <el-collapse-item title="🎨 25 种风格维度" name="styles">
              <div style="font-size:13px;color:#606266;line-height:1.8">
                从设计风格到色彩方案共计 25 个维度，三级分类流水线：<br>
                <el-tag size="small" type="info">① 关键词匹配</el-tag> →
                <el-tag size="small" type="success">② 向量语义检索</el-tag> →
                <el-tag size="small" type="warning">③ LLM 兜底</el-tag>
              </div>
            </el-collapse-item>
            <el-collapse-item title="🔤 DSL 模板语法" name="dsl">
              <div style="font-size:13px;color:#606266;line-height:1.8">
                支持在 prompt 中使用模板语法：<br>
                <code>{option1|option2}</code> — 随机变体<br>
                <code>__wildcard__</code> — 从通配符池取值<br>
                <code>{2$$a|b|c}</code> — 随机选 N 个<br><br>
                <el-tag size="small" type="info">示例</el-tag>
                <code>A {big|small} {cat|dog} in __colors__</code>
              </div>
            </el-collapse-item>
          </el-collapse>
        </el-card>

        <el-card shadow="never" style="margin-top:16px">
          <template #header><span>📋 快速示例</span></template>
          <div v-for="(group,gi) in exampleGroups" :key="gi" style="margin-bottom:8px">
            <div style="font-size:12px;color:#909399;margin-bottom:4px">{{ group.title }}</div>
            <el-tag v-for="ex in group.items" :key="ex" size="small"
              style="cursor:pointer;margin:2px" @click="input=ex;result=null;classResult=null;evalResult=null;error=''">
              {{ ex }}
            </el-tag>
          </div>
        </el-card>
      </el-col>
    </el-row>
  `,
  setup() {
    const input = ref('');
    const inputText = ref('');
    const platform = ref('midjourney');
    const platforms = ref([
      {value:'midjourney', label:'🎨 Midjourney'},
      {value:'stable-diffusion', label:'🖌️ Stable Diffusion'},
      {value:'dall-e', label:'🖼️ DALL·E 3'},
      {value:'tongyi-wanxiang', label:'🏮 通义万相'},
      {value:'wenyi-xinyi', label:'📜 文心一格'},
      {value:'jimeng', label:'⚡ 即梦'},
      {value:'nano-banana-pro', label:'🍌 Nano Banana Pro'},
    ]);
    const loading = ref(false);
    const classifying = ref(false);
    const evaluating = ref(false);
    const result = ref(null);
    const classResult = ref(null);
    const evalResult = ref(null);
    const error = ref('');
    const activeHelps = ref(['basic']);
    const previewModel = ref('picsum');
    const imageModelsData = ref([]);
    const imageModels = ref([]);
    const previewUrl = ref('');
    const previewing = ref(false);
    const dimHints = {clarity:'清晰度',specificity:'具体性',creativity:'创意性',actionability:'可操作性',platform_best:'平台适配'};

    const examples = [
      'a majestic cat sitting on a velvet throne',
      'cyberpunk city at night with neon lights',
      '一只金色的凤凰在夕阳下展翅飞翔',
      '水彩风格的樱花树下少女',
      'an astronaut riding a horse on Mars with dramatic lighting',
    ];

    const exampleGroups = [
      {title:'风景', items:['sunset over mountain lake with mist','aurora borealis over snow-covered cabin','梦幻森林中的魔法光斑']},
      {title:'人物', items:['portrait of a warrior queen with golden armor','anime girl with flowing hair in cherry blossom','水墨画风格的古代侠客']},
      {title:'科幻', items:['cyberpunk hacker in neon-lit alley','steampunk airship above clouds','futuristic city with flying cars at dusk']},
      {title:'动物', items:['majestic white wolf with glowing blue eyes','孔雀在雨中开屏','golden retriever puppy in flower field']},
    ];

    async function optimize() {
      if (!input.value.trim()) return;
      loading.value = true; result.value = null; classResult.value = null; evalResult.value = null; error.value = '';
      try {
        const d = await api.post('/v1/optimize', {prompt: input.value, platform: platform.value});
        if (d.detail) { error.value = typeof d.detail === 'string' ? d.detail : JSON.stringify(d.detail); return; }
        result.value = d; inputText.value = input.value;
      } catch(e) { error.value = String(e); }
      finally { loading.value = false; }
    }
    async function classify() {
      if (!input.value.trim()) return;
      classifying.value = true; error.value = '';
      try {
        classResult.value = await api.post('/v1/classify', {prompt: input.value});
      } catch(e) { error.value = String(e); }
      finally { classifying.value = false; }
    }
    async function evaluate() {
      if (!result.value?.optimized_prompt) {
        error.value = '请先优化 prompt，再进行评估对比';
        return;
      }
      evaluating.value = true; error.value = '';
      try {
        const d = await api.post('/v1/evaluate', {original: result.value.prompt_original || result.value.input, optimized: result.value.optimized_prompt});
        if (d.scores) {
          evalResult.value = {
            scores: Object.entries(d.scores).map(([k,v]) => ({dimension: dimHints[k]||k, ...v})),
            overall: d.overall_improvement?.toFixed(2) || '-'
          };
        }
      } catch(e) { error.value = String(e); }
      finally { evaluating.value = false; }
    }
    function clear() { input.value = ''; result.value = null; classResult.value = null; evalResult.value = null; error.value = ''; }

    // 加载图片模型清单
    api.get('/v1/image-models').then(m => { imageModelsData.value = m; });
    // 默认 picsum 在前
    setTimeout(() => { if (!imageModels.value.length) imageModelsData.value = [{id:'picsum',name:'Picsum Photos',requires_key:false}]; }, 1000);

    async function generatePreview() {
      if (!result.value?.optimized_prompt) return;
      previewing.value = true; previewUrl.value = '';
      try {
        const d = await api.post('/v1/preview', {prompt: result.value.optimized_prompt, model: previewModel.value});
        if (d.url) previewUrl.value = d.url;
        else if (d.note) error.value = d.note;
      } catch(e) { error.value = String(e); }
      finally { previewing.value = false; }
    }

    return { input, inputText, platform, platforms, loading, classifying, evaluating, result, classResult, evalResult, error,
             activeHelps, dimHints, examples, exampleGroups, optimize, classify, evaluate, clear,
             previewModel, imageModels, previewUrl, previewing, generatePreview };
  }
};

// ── Dashboard ────────────────────────────────────
const Dashboard = {
  template: `
    <el-row :gutter="16">
      <el-col :span="6" v-for="s in statCards" :key="s.label">
        <el-card shadow="never">
          <div style="font-size:28px;font-weight:bold;color:#409eff">{{ s.value }}</div>
          <div style="color:#909399;font-size:13px;margin-top:4px">{{ s.label }}</div>
          <div style="color:#c0c4cc;font-size:11px;margin-top:2px">{{ s.hint }}</div>
        </el-card>
      </el-col>
    </el-row>

    <el-card shadow="never" style="margin-top:16px">
      <template #header>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span>📚 引擎资源</span>
          <span style="font-size:12px;color:#909399">提示词引擎内嵌的全部资产</span>
        </div>
      </template>
      <el-row :gutter="16">
        <el-col :span="8">
          <div class="resource-block">
            <div class="resource-label">🎨 平台策略</div>
            <div class="resource-value">{{ resources.platforms || 0 }} <small>个</small></div>
            <el-tag v-for="p in (resources.platform_list || [])" :key="p" size="small" style="margin:2px">{{ p }}</el-tag>
          </div>
        </el-col>
        <el-col :span="8">
          <div class="resource-block">
            <div class="resource-label">📚 RAG 案例库</div>
            <div class="resource-value">{{ resources.rag_cases || 0 }} <small>条</small></div>
            <div style="font-size:12px;color:#909399">prompts_db (918) + seed_prompts (18)</div>
          </div>
          <div class="resource-block" style="margin-top:12px">
            <div class="resource-label">🏷️ MJ 关键词库</div>
            <div class="resource-value">{{ resources.mj_keywords || 0 }} <small>个</small></div>
            <div style="font-size:12px;color:#909399">25 维风格维度</div>
          </div>
        </el-col>
        <el-col :span="8">
          <div class="resource-block">
            <div class="resource-label">🤖 LLM 供应商</div>
            <div class="resource-value">{{ resources.llm_providers || 0 }} <small>个</small></div>
            <el-tag size="small" style="margin:2px">OpenAI</el-tag>
            <el-tag size="small" style="margin:2px">讯飞星火</el-tag>
            <el-tag size="small" style="margin:2px">Gemini</el-tag>
          </div>
          <div class="resource-block" style="margin-top:12px">
            <div class="resource-label">🔤 DSL 通配符池</div>
            <div class="resource-value">{{ resources.wildcards || 0 }} <small>个值</small></div>
            <div style="font-size:12px;color:#909399">10 类：colors/animals/styles/lighting...</div>
          </div>
          <div class="resource-block" style="margin-top:12px">
            <div class="resource-label">📋 模板</div>
            <div class="resource-value">{{ resources.templates || 0 }} <small>个</small></div>
            <div style="font-size:12px;color:#909399">midjourney (EN/ZH) + generic</div>
          </div>
        </el-col>
      </el-row>
    </el-card>

    <el-row :gutter="16" style="margin-top:16px">
      <el-col :span="12">
        <el-card shadow="never">
          <template #header>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span>🎨 分类分布</span>
              <span style="font-size:12px;color:#909399">各风格维度被分类的次数占比</span>
            </div>
          </template>
          <div ref="catChart" style="height:280px"></div>
          <div v-if="noData" style="text-align:center;color:#c0c4cc;padding:40px;font-size:13px">
            暂无数据。回到工作台优化/分类一些 prompt 后自动统计。
          </div>
        </el-card>
      </el-col>
      <el-col :span="12">
        <el-card shadow="never">
          <template #header>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span>📊 平台分布</span>
              <span style="font-size:12px;color:#909399">各平台被调用的次数对比</span>
            </div>
          </template>
          <div ref="platChart" style="height:280px"></div>
          <div v-if="noData" style="text-align:center;color:#c0c4cc;padding:40px;font-size:13px">
            暂无数据。回到工作台优化一些 prompt 后自动统计。
          </div>
        </el-card>
      </el-col>
    </el-row>
  `,
  setup() {
    const statCards = reactive([
      {label:'总请求数', value:0, hint:'所有平台累计调用次数'},
      {label:'成功率', value:'100%', hint:'成功/总请求'},
      {label:'平均耗时', value:'0ms', hint:'每次优化平均耗时'},
      {label:'错误数', value:0, hint:'失败的请求数量'},
    ]);
    const resources = reactive({});
    const catChart = ref(null);
    const platChart = ref(null);
    const noData = ref(true);

    onMounted(async () => {
      try {
        const overview = await api.get('/v1/stats/overview');
        const res = await api.get('/v1/resources');
        Object.assign(resources, res);
        statCards.length = 0;
        statCards.push(
          {label:'总请求数', value:overview.total_requests, hint:'所有平台累计调用次数'},
          {label:'成功率', value:overview.success_rate+'%', hint:'成功/总请求'},
          {label:'平均耗时', value:overview.avg_time_ms+'ms', hint:'每次优化平均耗时'},
          {label:'错误数', value:overview.error_count, hint:'失败的请求数量'},
        );

        const [cats, plats] = await Promise.all([
          api.get('/v1/stats/categories'),
          api.get('/v1/stats/platforms')
        ]);

        if (cats.length === 0 || plats.length === 0) { noData.value = true; }

        if (window.echarts && cats.length > 0) {
          const ec1 = echarts.init(catChart.value);
          ec1.setOption({
            tooltip:{trigger:'item', formatter:'{b}: {c} ({d}%)'},
            series:[{
              type:'pie', radius:['30%','70%'],
              data: cats.map(c=>({name:c.name, value:c.count})),
              label:{fontSize:11, formatter:'{b}\n{d}%'},
              emphasis:{itemStyle:{shadowBlur:10,shadowOffsetX:0,shadowColor:'rgba(0,0,0,0.5)'}}
            }]
          });
        }
        if (window.echarts && plats.length > 0) {
          const ec2 = echarts.init(platChart.value);
          ec2.setOption({
            tooltip:{trigger:'axis'},
            xAxis:{type:'category', data:plats.map(p=>p.platform), axisLabel:{fontSize:11}},
            yAxis:{type:'value'},
            series:[{
              type:'bar', data:plats.map(p=>p.count),
              itemStyle:{color:'#409eff', borderRadius:[4,4,0,0]},
              barWidth:'50%',
              label:{show:true, position:'top', fontSize:11}
            }]
          });
        }
      } catch(e) {}
    });
    return { statCards, resources, catChart, platChart, noData };
  }
};
