# 图片生成提示词优化引擎配置
# 通过环境变量 CONFIG_PATH 可指定自定义路径

llm:
  # 供应商: openai_compat | xfyun
  provider: xfyun
  openai_compat:
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://openrouter.ai/api/v1"
    model: "deepseek/deepseek-chat"
    temperature: 0.7
    max_tokens: 500
    timeout: 15
  xfyun:
    api_key: "d4ca37f4d0ad54353befdf6ccff82e42:MTJhNTkwNWMxNDBlYWJmMDkwNGVlNGQw"
    base_url: "https://maas-coding-api.cn-huabei-1.xf-yun.com/v2"
    model: "astron-code-latest"
    temperature: 0.7
    max_tokens: 500
    timeout: 15

engine:
  default_platform: generic      # 默认平台
  default_style: realistic       # 默认风格
  max_retries: 2                 # LLM 调用重试次数

server:
  host: "0.0.0.0"
  port: 8013
  log_level: info

# 知识库（RAG）配置
knowledge:
  enabled: true                  # 开关
  embedding:
    model: "text-embedding-3-small"
  persist_dir: "./prompts_db"    # ChromaDB 持久化目录
  retrieval:
    top_k: 3                     # 每次检索返回数
    min_score: 0.3               # 最低相似度阈值

# 平台策略配置
platforms:
  midjourney:
    enabled: true
    default_aspect_ratio: "16:9"
    default_version: "6"
  stable_diffusion:
    enabled: true
  dalle:
    enabled: true
  tongyi:
    enabled: true
  yizhang:
    enabled: true
  jimeng:
    enabled: true
  generic:
    enabled: true
