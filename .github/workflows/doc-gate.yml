name: Doc Sync Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  doc-sync:
    name: 文档同步检查
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史（draft-changelog 需要）

      - name: 检查 gh CLI
        run: |
          gh --version || (echo "❌ gh CLI 未安装" && exit 1)

      - name: 检查文档同步（硬门禁）
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ ! -f team/scripts/check-docs-sync.sh ]; then
            echo "⚠️ team/scripts/check-docs-sync.sh 不存在，跳过文档同步检查"
            exit 0
          fi
          chmod +x team/scripts/check-docs-sync.sh
          bash team/scripts/check-docs-sync.sh \
            --base=${{ github.event.pull_request.base.ref }} \
            --head=${{ github.event.pull_request.head.ref }}

      - name: 起草 CHANGELOG
        if: success()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ ! -f team/scripts/draft-changelog.sh ]; then
            echo "⚠️ team/scripts/draft-changelog.sh 不存在，跳过 CHANGELOG 起草"
            exit 0
          fi
          chmod +x team/scripts/draft-changelog.sh
          mkdir -p team/inbox
          bash team/scripts/draft-changelog.sh \
            --output=team/inbox/changelog-draft-${PR_NUMBER}.md

      - name: 上传 CHANGELOG 草稿
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: changelog-draft-${{ github.event.pull_request.number }}
          path: team/inbox/changelog-draft-${{ github.event.pull_request.number }}.md
          retention-days: 30

  ci-tests:
    name: 单元测试 + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/Colinchiu007/shared-models.git
          pip install -e ".[all]"

      - name: 运行测试
        run: |
          if [ -d tests ]; then
            pytest tests/ -q --tb=short --ignore=tests/test_web_e2e.py --ignore=tests/test_qa_comprehensive.py --ignore=tests/test_infinity_features.py --ignore=tests/test_v010_engineering.py
          fi

  stale-check:
    name: Stale Issue 检查（每日）
    runs-on: ubuntu-latest
    permissions:
      issues: write
    if: github.event_name == 'pull_request'
    steps:
      - name: 标记 Stale Issues
        run: |
          echo "⚠️ Stale 检查将由独立 cron 触发（避免 PR 时执行）"
          echo "详见 .github/workflows/stale.yml（待创建）"
